<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zine Imposer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a18;
    --paper: #f5f2eb;
    --paper2: #ede9df;
    --accent: #c84b2f;
    --accent2: #2b5f3e;
    --rule: #c8c4b8;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html, body {
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 4rem 2rem 6rem;
  }

  header {
    border-bottom: 1px solid var(--rule);
    padding-bottom: 2rem;
    margin-bottom: 3rem;
  }

  .masthead {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: var(--mono);
    font-size: 1.75rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .issue {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0.15rem 0.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .tagline {
    font-size: 0.875rem;
    color: #666;
    font-weight: 300;
    line-height: 1.5;
  }

  /* drop zone */
  .drop-zone {
    border: 1.5px dashed var(--rule);
    background: var(--paper2);
    border-radius: 2px;
    padding: 3.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: #f0ede6;
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    display: block;
    margin: 0 auto 1rem;
    width: 40px;
    height: 40px;
    opacity: 0.35;
  }

  .drop-label {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--ink);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 0.35rem;
  }

  .drop-sub {
    font-size: 0.8rem;
    color: #888;
  }

  /* file info bar */
  .file-info {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.875rem 1rem;
    background: var(--paper2);
    border: 1px solid var(--rule);
    border-radius: 2px;
    margin-top: 1rem;
  }

  .file-icon {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .file-icon svg { width: 14px; height: 14px; }

  .file-meta { flex: 1; min-width: 0; }
  .file-name {
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--ink);
  }
  .file-size {
    font-size: 0.72rem;
    color: #888;
    margin-top: 1px;
  }

  .clear-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #aaa;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0 0.25rem;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--accent); }

  /* info grid */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    margin-top: 1.5rem;
    margin-bottom: 2rem;
  }

  .info-cell {
    background: var(--paper);
    padding: 1rem 1.25rem;
  }

  .info-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #888;
    margin-bottom: 0.3rem;
  }

  .info-value {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--ink);
  }

  .info-value.accent { color: var(--accent); }

  /* impose button */
  .impose-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    width: 100%;
    padding: 1rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .impose-btn:hover:not(:disabled) { background: #2c2c2a; }
  .impose-btn:active:not(:disabled) { transform: scale(0.99); }
  .impose-btn:disabled { background: #b0ae a8; cursor: not-allowed; opacity: 0.5; }

  /* progress */
  .progress-wrap {
    margin-top: 1.5rem;
    display: none;
  }
  .progress-wrap.visible { display: block; }

  .progress-bar-track {
    height: 2px;
    background: var(--rule);
    border-radius: 1px;
    overflow: hidden;
    margin-bottom: 0.6rem;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    width: 0%;
    transition: width 0.3s ease;
  }

  .progress-label {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: #888;
    letter-spacing: 0.04em;
  }

  /* result */
  .result-area {
    margin-top: 2rem;
    display: none;
  }
  .result-area.visible { display: block; }

  .result-rule {
    border: none;
    border-top: 1px solid var(--rule);
    margin-bottom: 2rem;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    margin-bottom: 1.5rem;
  }

  .download-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    width: 100%;
    padding: 1rem;
    background: var(--accent2);
    color: #f0f7f3;
    border: none;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
  }
  .download-btn:hover { background: #234e33; }

  /* imposition diagram */
  .diagram {
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--rule);
  }

  .diagram-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #888;
    margin-bottom: 1.25rem;
  }

  .sheet-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
    font-family: var(--mono);
    font-size: 0.72rem;
  }

  .sheet-label {
    width: 5.5rem;
    flex-shrink: 0;
    color: #888;
  }

  .spread-vis {
    display: flex;
    gap: 1px;
    flex: 1;
  }

  .spread-half {
    flex: 1;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.68rem;
    font-weight: 500;
  }

  .spread-half.content {
    background: var(--paper2);
    border: 1px solid var(--rule);
    color: var(--ink);
  }

  .spread-half.blank {
    background: var(--paper);
    border: 1px dashed var(--rule);
    color: #bbb;
  }

  .fold-line {
    width: 1px;
    height: 36px;
    background: var(--accent);
    flex-shrink: 0;
    position: relative;
  }

  .fold-line::before {
    content: 'fold';
    position: absolute;
    top: -1.2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--accent);
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .error-msg {
    margin-top: 1rem;
    padding: 0.875rem 1rem;
    background: #fdf0ee;
    border: 1px solid #f0c4bc;
    border-radius: 2px;
    font-size: 0.82rem;
    color: var(--accent);
    display: none;
  }
  .error-msg.visible { display: block; }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="masthead">
      <h1>Zine Imposer</h1>
      <span class="issue">Saddle-stitch</span>
    </div>
    <p class="tagline">Upload a PDF and get a print-ready imposed booklet — pages arranged for short-edge duplex printing, folding, and stapling.</p>
  </header>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" accept=".pdf,application/pdf" id="fileInput">
    <svg class="drop-icon" viewBox="0 0 40 40" fill="none">
      <rect x="8" y="4" width="18" height="24" rx="1" stroke="currentColor" stroke-width="1.5"/>
      <path d="M22 4l6 6v22H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M22 4v6h6" stroke="currentColor" stroke-width="1.5"/>
      <path d="M13 28l5 4 5-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M18 32v-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <p class="drop-label">Drop PDF here</p>
    <p class="drop-sub">or click to browse</p>
  </div>

  <div class="file-info" id="fileInfo" style="display:none">
    <div class="file-icon">
      <svg viewBox="0 0 14 18" fill="none">
        <path d="M1 1h8l4 4v12H1V1z" stroke="white" stroke-width="1.2"/>
        <path d="M9 1v4h4" stroke="white" stroke-width="1.2"/>
        <path d="M4 9h6M4 12h4" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="file-meta">
      <div class="file-name" id="fileName"></div>
      <div class="file-size" id="fileSize"></div>
    </div>
    <button class="clear-btn" id="clearBtn" title="Remove file">×</button>
  </div>

  <div class="info-grid" id="infoGrid" style="display:none">
    <div class="info-cell">
      <div class="info-label">Pages in</div>
      <div class="info-value" id="infoPageCount">—</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Padding</div>
      <div class="info-value accent" id="infoPadding">—</div>
    </div>
    <div class="info-cell">
      <div class="info-label">Sheets out</div>
      <div class="info-value" id="infoSheets">—</div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <button class="impose-btn" id="imposeBtn" disabled>
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <rect x="1" y="2" width="5" height="10" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
      <rect x="8" y="2" width="5" height="10" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
    </svg>
    Impose zine
  </button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">Preparing…</div>
  </div>

  <div class="result-area" id="resultArea">
    <hr class="result-rule">
    <div class="result-grid" id="resultGrid"></div>
    <a class="download-btn" id="downloadBtn" href="#" download>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 2v7M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 11h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Download imposed PDF
    </a>

    <div class="diagram" id="diagram"></div>

  </div>

  <!-- Imposition explainer graphic -->
  <div style="margin-top:3rem;padding-top:2rem;border-top:1px solid #c8c4b8;">
    <svg width="100%" viewBox="0 0 600 340" role="img" style="display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">
      <title>Page imposition diagram</title>
      <desc>Shows how 8 source pages are rearranged into 4 imposed spreads for saddle-stitch printing</desc>
      <defs>
        <marker id="imp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#c84b2f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <style>
        .il { font-family:"DM Mono",monospace; font-size:10px; fill:#999; }
        .ip { font-family:"DM Mono",monospace; font-size:12px; font-weight:500; fill:#1a1a18; }
        .ih { font-family:"DM Mono",monospace; font-size:9px; letter-spacing:0.1em; fill:#aaa; }
        .ic { font-family:"DM Mono",monospace; font-size:9px; fill:#c84b2f; }
        @media (prefers-color-scheme:dark){
          .ip{fill:#e8e4da;} .il{fill:#666;} .ih{fill:#555;} .ic{fill:#e8633f;}
        }
      </style>

      <!-- SECTION HEADERS -->
      <text class="ih" x="0" y="14">BEFORE</text>
      <text class="ih" x="270" y="14">AFTER — print order</text>
      <text class="ih" x="500" y="14">RESULT</text>

      <!-- ── SOURCE PAGES: 2 rows of 4 ── -->
      <!-- row 1: pg 1-4 -->
      <rect x="0"   y="26" width="36" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="18"  y="55" text-anchor="middle" dominant-baseline="central">1</text>
      <rect x="42"  y="26" width="36" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="60"  y="55" text-anchor="middle" dominant-baseline="central">2</text>
      <rect x="84"  y="26" width="36" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="102" y="55" text-anchor="middle" dominant-baseline="central">3</text>
      <rect x="126" y="26" width="36" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="144" y="55" text-anchor="middle" dominant-baseline="central">4</text>
      <!-- row 2: pg 5-8 -->
      <rect x="0"   y="82" width="36" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="18"  y="111" text-anchor="middle" dominant-baseline="central">5</text>
      <rect x="42"  y="82" width="36" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="60"  y="111" text-anchor="middle" dominant-baseline="central">6</text>
      <rect x="84"  y="82" width="36" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="102" y="111" text-anchor="middle" dominant-baseline="central">7</text>
      <rect x="126" y="82" width="36" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="144" y="111" text-anchor="middle" dominant-baseline="central">8</text>

      <!-- ARROW -->
      <line x1="178" y1="83" x2="220" y2="83" stroke="#c84b2f" stroke-width="1.5" marker-end="url(#imp-arr)"/>
      <text class="il" x="199" y="78" text-anchor="middle">impose</text>

      <!-- ── IMPOSED SPREADS ── -->
      <!-- each spread: left half 60w + fold 1px + right half 60w = 121w total -->
      <!-- Sheet 1 Front -->
      <text class="il" x="230" y="37" text-anchor="start">sheet 1 · front</text>
      <rect x="230" y="44" width="60" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="260" y="69" text-anchor="middle" dominant-baseline="central">8</text>
      <line x1="290" y1="44" x2="290" y2="92" stroke="#c84b2f" stroke-width="1.2" stroke-dasharray="3 2"/>
      <rect x="290" y="44" width="60" height="48" rx="2" fill="#e5dece" stroke="#b8b0a0" stroke-width="0.75"/>
      <text class="ip" x="320" y="62" text-anchor="middle" dominant-baseline="central">1</text>
      <text class="ic" x="320" y="76" text-anchor="middle" dominant-baseline="central">cover</text>

      <!-- Sheet 1 Back -->
      <text class="il" x="230" y="112" text-anchor="start">sheet 1 · back</text>
      <rect x="230" y="118" width="60" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="260" y="143" text-anchor="middle" dominant-baseline="central">2</text>
      <line x1="290" y1="118" x2="290" y2="166" stroke="#c84b2f" stroke-width="1.2" stroke-dasharray="3 2"/>
      <rect x="290" y="118" width="60" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="320" y="143" text-anchor="middle" dominant-baseline="central">7</text>

      <!-- Sheet 2 Front -->
      <text class="il" x="230" y="186" text-anchor="start">sheet 2 · front</text>
      <rect x="230" y="192" width="60" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="260" y="217" text-anchor="middle" dominant-baseline="central">6</text>
      <line x1="290" y1="192" x2="290" y2="240" stroke="#c84b2f" stroke-width="1.2" stroke-dasharray="3 2"/>
      <rect x="290" y="192" width="60" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="320" y="217" text-anchor="middle" dominant-baseline="central">3</text>

      <!-- Sheet 2 Back -->
      <text class="il" x="230" y="260" text-anchor="start">sheet 2 · back</text>
      <rect x="230" y="266" width="60" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="260" y="291" text-anchor="middle" dominant-baseline="central">4</text>
      <line x1="290" y1="266" x2="290" y2="314" stroke="#c84b2f" stroke-width="1.2" stroke-dasharray="3 2"/>
      <rect x="290" y="266" width="60" height="48" rx="2" fill="#ede9df" stroke="#c8c4b8" stroke-width="0.75"/>
      <text class="ip" x="320" y="291" text-anchor="middle" dominant-baseline="central">5</text>

      <!-- RESULT ARROW -->
      <line x1="366" y1="155" x2="408" y2="155" stroke="#c84b2f" stroke-width="1.5" marker-end="url(#imp-arr)"/>

      <!-- ── BOOKLET ILLUSTRATION ── -->
      <!-- stacked sheets offset for depth -->
      <rect x="422" y="80"  width="58" height="76" rx="3" fill="#d8d4c8" stroke="#bbb7ac" stroke-width="0.5"/>
      <rect x="418" y="76"  width="58" height="76" rx="3" fill="#e2ddd4" stroke="#c0bcb0" stroke-width="0.5"/>
      <rect x="414" y="72"  width="58" height="76" rx="3" fill="#ede9df" stroke="#b5b0a4" stroke-width="0.75"/>
      <!-- spine (red line = stapled fold) -->
      <line x1="414" y1="72" x2="414" y2="148" stroke="#c84b2f" stroke-width="2.5" stroke-linecap="round"/>
      <!-- staples -->
      <rect x="411" y="87"  width="6" height="3" rx="1" fill="#c84b2f"/>
      <rect x="411" y="129" width="6" height="3" rx="1" fill="#c84b2f"/>
      <!-- page label -->
      <text class="ip" x="443" y="107" text-anchor="middle" dominant-baseline="central">1 → 8</text>
      <text class="il" x="443" y="122" text-anchor="middle">reads in order</text>

      <!-- reading arc arrow under booklet -->
      <path d="M 420 155 Q 443 174 466 155" fill="none" stroke="#c8c4b8" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#imp-arr)"/>
      <text class="il" x="443" y="186" text-anchor="middle">fold here</text>
      <!-- staple label -->
      <text class="il" x="405" y="110" text-anchor="end">staple</text>
      <line x1="406" y1="108" x2="412" y2="103" stroke="#c8c4b8" stroke-width="0.75"/>

    </svg>
  </div>

</div>

<script>
const { PDFDocument } = PDFLib;

let currentFile = null;
let pdfMeta = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const clearBtn = document.getElementById('clearBtn');
const infoGrid = document.getElementById('infoGrid');
const imposeBtn = document.getElementById('imposeBtn');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const resultArea = document.getElementById('resultArea');
const resultGrid = document.getElementById('resultGrid');
const downloadBtn = document.getElementById('downloadBtn');
const errorMsg = document.getElementById('errorMsg');
const diagram = document.getElementById('diagram');

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function setProgress(pct, label) {
  progressFill.style.width = pct + '%';
  progressLabel.textContent = label;
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}

function clearError() {
  errorMsg.classList.remove('visible');
}

async function loadPdfMeta(file) {
  const buf = await file.arrayBuffer();
  const doc = await PDFDocument.load(buf, { ignoreEncryption: true });
  const n = doc.getPageCount();
  const padding = (4 - (n % 4)) % 4;
  const total = n + padding;
  const sheets = total / 4;
  const page = doc.getPage(0);
  const { width, height } = page.getSize();
  return { n, padding, total, sheets, width, height, buf };
}

async function handleFile(file) {
  if (!file || file.type !== 'application/pdf' && !file.name.endsWith('.pdf')) {
    showError('Please select a PDF file.');
    return;
  }
  clearError();
  currentFile = file;
  fileName.textContent = file.name;
  fileSize.textContent = formatBytes(file.size);
  fileInfo.style.display = 'flex';
  dropZone.style.display = 'none';
  resultArea.classList.remove('visible');
  progressWrap.classList.remove('visible');

  try {
    pdfMeta = await loadPdfMeta(file);
    document.getElementById('infoPageCount').textContent = pdfMeta.n;
    document.getElementById('infoPadding').textContent = pdfMeta.padding === 0 ? '0' : '+' + pdfMeta.padding;
    document.getElementById('infoSheets').textContent = pdfMeta.sheets;
    infoGrid.style.display = 'grid';
    imposeBtn.disabled = false;
  } catch(e) {
    showError('Could not read PDF: ' + e.message);
    imposeBtn.disabled = true;
  }
}

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

clearBtn.addEventListener('click', () => {
  currentFile = null;
  pdfMeta = null;
  fileInput.value = '';
  fileInfo.style.display = 'none';
  infoGrid.style.display = 'none';
  dropZone.style.display = 'block';
  resultArea.classList.remove('visible');
  progressWrap.classList.remove('visible');
  imposeBtn.disabled = true;
  clearError();
});

function buildDiagram(total, n) {
  const numSheets = total / 4;
  const pageLabel = i => (i < n) ? 'pg ' + (i + 1) : 'blank';

  let html = '<div class="diagram-title">Imposition layout</div>';

  for (let s = 0; s < numSheets; s++) {
    const fl = total - 2*s - 1;
    const fr = 2*s;
    const bl = 2*s + 1;
    const br = total - 2*s - 2;

    const half = (i) => {
      const isBlank = i >= n;
      return `<div class="spread-half ${isBlank ? 'blank' : 'content'}">${pageLabel(i)}</div>`;
    };

    html += `
      <div class="sheet-row">
        <span class="sheet-label">Sheet ${s+1} front</span>
        <div class="spread-vis">
          ${half(fl)}
          <div class="fold-line"></div>
          ${half(fr)}
        </div>
      </div>
      <div class="sheet-row">
        <span class="sheet-label">Sheet ${s+1} back</span>
        <div class="spread-vis">
          ${half(bl)}
          <div class="fold-line" style="visibility:hidden"></div>
          ${half(br)}
        </div>
      </div>`;
  }
  return html;
}

imposeBtn.addEventListener('click', async () => {
  if (!currentFile || !pdfMeta) return;
  clearError();
  imposeBtn.disabled = true;
  progressWrap.classList.add('visible');
  resultArea.classList.remove('visible');

  try {
    const { n, padding, total, sheets, width, height, buf } = pdfMeta;
    const spreadW = width * 2;

    setProgress(5, 'Loading source PDF…');
    const srcDoc = await PDFDocument.load(buf);

    setProgress(15, 'Creating output document…');
    const outDoc = await PDFDocument.create();

    const numSheets = total / 4;
    const totalSpreads = numSheets * 2;

    for (let s = 0; s < numSheets; s++) {
      // Front: left = total-2s-1, right = 2s
      // Back:  left = 2s+1,       right = total-2s-2
      const pairs = [
        [total - 2*s - 1, 2*s],
        [2*s + 1, total - 2*s - 2],
      ];

      for (let side = 0; side < 2; side++) {
        const [leftIdx, rightIdx] = pairs[side];
        const spreadPage = outDoc.addPage([spreadW, height]);
        const pct = 15 + Math.round(80 * (s * 2 + side) / totalSpreads);
        setProgress(pct, `Imposing sheet ${s + 1} of ${numSheets}…`);

        for (const [srcIdx, xOffset] of [[leftIdx, 0], [rightIdx, width]]) {
          if (srcIdx >= n) continue; // blank padding

          // embedPdf embeds a single page as a Form XObject — same as
          // pikepdf's as_form_xobject(), robust for all PDF content types
          const [embeddedPage] = await outDoc.embedPdf(srcDoc, [srcIdx]);
          spreadPage.drawPage(embeddedPage, {
            x: xOffset,
            y: 0,
            width: width,
            height: height,
          });
        }
      }
    }

    setProgress(97, 'Saving…');
    const outBytes = await outDoc.save();

    setProgress(100, 'Done!');

    const blob = new Blob([outBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const baseName = currentFile.name.replace(/\.pdf$/i, '');
    downloadBtn.href = url;
    downloadBtn.download = baseName + '_zine.pdf';

    // Result stats
    resultGrid.innerHTML = `
      <div class="info-cell">
        <div class="info-label">Output spreads</div>
        <div class="info-value">${totalSpreads}</div>
      </div>
      <div class="info-cell">
        <div class="info-label">Physical sheets</div>
        <div class="info-value">${numSheets}</div>
      </div>
      <div class="info-cell">
        <div class="info-label">Spread size</div>
        <div class="info-value" style="font-size:0.8rem">${Math.round(spreadW)}×${Math.round(height)}<span style="font-size:0.6rem;color:#888"> pt</span></div>
      </div>
      <div class="info-cell">
        <div class="info-label">Output size</div>
        <div class="info-value">${formatBytes(outBytes.length)}</div>
      </div>`;

    diagram.innerHTML = buildDiagram(total, n);
    resultArea.classList.add('visible');

  } catch(e) {
    showError('Imposition failed: ' + e.message);
    progressWrap.classList.remove('visible');
  } finally {
    imposeBtn.disabled = false;
  }
});
</script>
</body>
</html>
